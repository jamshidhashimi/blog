<header class="site-header">
  <div class="site-header__inner">
    <a class="site-brand" href="/" aria-label="Home">
      <img class="site-brand__avatar" src="{{ .Site.Params.authorPhoto }}" alt="{{ .Site.Params.author }}" width="48" height="48">
      <span class="site-brand__name">{{ .Site.Params.author }}</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="/" class="site-nav__link{{ if .IsHome }} is-active{{ end }}">Posts</a>
      <a href="/about/" class="site-nav__link">About</a>
      <a href="/rss.xml" class="site-nav__link">RSS</a>
    </nav>
  </div>
</header>
