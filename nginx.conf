server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Common security headers (lightweight; tune as needed)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively (Hugo fingerprints CSS/JS)
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML should always be revalidated
    location ~* \.(?:html|xml)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Hugo-style URLs end with `/`. Try the file, then try as a directory.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 — Hugo writes /404.html
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
